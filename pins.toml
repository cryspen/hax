# Pinned external tools and proof libraries for the lean backend.
#
# Consumed by:
#   - install-aeneas.sh  (downloads/verifies the aeneas + charon binaries)
#   - hax-types/build.rs (bakes the values into `hax_types::pins`, used by the
#     backend's version checks, generated lakefiles, and `--help`)

[aeneas]
# Release tag (the release must carry assets named aeneas-<platform>.tar.gz).
tag = "nightly-2026.07.21-52fd438"
# Short commit SHA that `aeneas -version` must report.
commit = "52fd438"
# Source repository URL. install-aeneas.sh rejects any value other than:
#   - https://github.com/AeneasVerif/aeneas  (upstream)
#   - https://github.com/cryspen/aeneas      (fork)
repo = "https://github.com/cryspen/aeneas"

[charon]
# Release tag from https://github.com/AeneasVerif/charon/releases.
# Must match the charon version expected by the pinned aeneas: check the
# `charon-pin` file in the AeneasVerif/aeneas repo at [aeneas].commit (that is
# aeneas's own pin, not this file).
tag = "nightly-2026.07.16"
# Expected output of `charon version` for this release.
version = "0.1.223"

[lean]
# Lean toolchain written into the `lean-toolchain` of projects
toolchain = "leanprover/lean4:v4.31.0"

[hax-lean-lib]
# Hax library emitted as the `require Hax` of generated lakefiles
version = "v0.2.0"
repo = "https://github.com/cryspen/hax-lean"
