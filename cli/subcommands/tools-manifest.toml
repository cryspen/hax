# ---- fallback templates -----------------------------------------------------
# Used for versions this manifest does not list (typically ones published
# after this release of hax): `{version}` is substituted with the requested
# version, the download is not checksum-verified, and a warning is printed.
# The aeneas template points at the repository the defaults come from
# (the cryspen fork); versions published only upstream are not reachable
# through it.

[fallback.aeneas.linux-x86_64]
url = "https://github.com/cryspen/aeneas/releases/download/{version}/aeneas-linux-x86_64.tar.gz"
entry_points = { aeneas = "aeneas" }

[fallback.aeneas.macos-x86_64]
url = "https://github.com/cryspen/aeneas/releases/download/{version}/aeneas-macos-x86_64.tar.gz"
entry_points = { aeneas = "aeneas" }

[fallback.aeneas.macos-aarch64]
url = "https://github.com/cryspen/aeneas/releases/download/{version}/aeneas-macos-aarch64.tar.gz"
entry_points = { aeneas = "aeneas" }

[fallback.charon.linux-x86_64]
url = "https://github.com/AeneasVerif/charon/releases/download/{version}/charon-linux-x86_64.tar.gz"
entry_points = { charon = "charon", charon-driver = "charon-driver" }

[fallback.charon.macos-x86_64]
url = "https://github.com/AeneasVerif/charon/releases/download/{version}/charon-macos-x86_64.tar.gz"
entry_points = { charon = "charon", charon-driver = "charon-driver" }

