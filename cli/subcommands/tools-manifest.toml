# Version manifest of hax's managed external tools, embedded into the
# `cargo-hax` binary at build time.
#
# It maps tool name, version, and platform to a download URL and SHA-256
# checksum, plus `entry_points` where the archive layout deviates from the
# `bin/<name>` convention. Only versions listed here install with checksum
# verification; other versions go through the `[fallback]` templates below,
# unverified and with a warning.
#
# Entries are only added, never removed: every version ever published stays
# installable with verification. Adding a version is a single reviewed
# commit; record the artifact's provenance in a comment when it is not
# obvious from the URL.

# ---- aeneas -----------------------------------------------------------------
# Provenance: pre-built archives published by the cryspen/aeneas fork's
# nightly releases (upstream: AeneasVerif/aeneas). Archives are flat, with
# the executable at the archive root.

[tools.aeneas."nightly-2026.07.21-52fd438".linux-x86_64]
url = "https://github.com/cryspen/aeneas/releases/download/nightly-2026.07.21-52fd438/aeneas-linux-x86_64.tar.gz"
sha256 = "5efe308ae41bd195b17bd40d64efef83510698657c8e3964af45827a788d209d"
entry_points = { aeneas = "aeneas" }

[tools.aeneas."nightly-2026.07.21-52fd438".macos-x86_64]
url = "https://github.com/cryspen/aeneas/releases/download/nightly-2026.07.21-52fd438/aeneas-macos-x86_64.tar.gz"
sha256 = "35023a75488567155bbc8e695dfd2af856089c9a6d670f329c68527fb4c8b43c"
entry_points = { aeneas = "aeneas" }

[tools.aeneas."nightly-2026.07.21-52fd438".macos-aarch64]
url = "https://github.com/cryspen/aeneas/releases/download/nightly-2026.07.21-52fd438/aeneas-macos-aarch64.tar.gz"
sha256 = "791ea4a091f02aa628375a796c76ef33b161fb19d0a45c830aa22af18c74d3d5"
entry_points = { aeneas = "aeneas" }

