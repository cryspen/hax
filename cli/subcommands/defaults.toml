# Built-in default versions of hax's external tools, embedded into the
# `cargo-hax` binary at build time. This file follows the schema of a
# project's `hax.toml`: a project without a `hax.toml` (or without an
# entry for a given tool) resolves to these versions.
#
# Kept in lockstep with the workspace-root `pins.toml` (enforced by a
# test) until `pins.toml` is retired.

[tools]
# Managed tools, pinned by upstream release tag.
aeneas = "nightly-2026.07.21-52fd438"
charon = "nightly-2026.07.16"

[versions]
# Declared-only versions: known to hax, but not installed by it.
# The Lean toolchain, written verbatim into generated `lean-toolchain` files.
lean = "leanprover/lean4:v4.31.0"
# The Lean library that extracted code builds against.
hax-lean-lib = "v0.1.0"
